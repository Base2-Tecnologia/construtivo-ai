name: CI/CD — Construtivo IA

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_whatsapp:
        description: "Incluir deploy do WhatsApp (Evolution API)?"
        type: boolean
        required: false
        default: false

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  PROJECT: construtivo-ia

jobs:
  # ===========================================================================
  # JOB 1: Metadados compartilhados
  # ===========================================================================
  ci_setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      environment:      ${{ steps.resolve.outputs.environment }}
      image-tag:        ${{ steps.resolve.outputs.image-tag }}
      should-deploy:    ${{ steps.resolve.outputs.should-deploy }}
      deploy-whatsapp:  ${{ steps.resolve.outputs.deploy-whatsapp }}
    steps:
      - name: Resolve environment e tag
        id: resolve
        run: |
          TAG="${GITHUB_SHA::8}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="prd"
          else
            ENV="dev"
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DEPLOY="false"
          else
            DEPLOY="true"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy_whatsapp }}" == "true" ]]; then
            DEPLOY_WA="true"
          else
            DEPLOY_WA="false"
          fi

          echo "environment=${ENV}"           >> "$GITHUB_OUTPUT"
          echo "image-tag=${TAG}"             >> "$GITHUB_OUTPUT"
          echo "should-deploy=${DEPLOY}"      >> "$GITHUB_OUTPUT"
          echo "deploy-whatsapp=${DEPLOY_WA}" >> "$GITHUB_OUTPUT"

          echo "### Build" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valor |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment       | \`${ENV}\`      |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag         | \`${TAG}\`      |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy            | \`${DEPLOY}\`   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy WhatsApp   | \`${DEPLOY_WA}\`|" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 2: Lint & Code Review (paralelo com builds)
  # Ferramentas open source gratuitas:
  #   • ESLint v8    — backend Node.js e frontend JS
  #   • Stylelint    — CSS
  #   • HTMLHint     — HTML
  #   • Hadolint     — Dockerfiles
  #   • Semgrep      — análise estática de segurança (regras públicas OWASP/Node)
  # ===========================================================================
  ci_lint:
    name: Lint & Code Review
    runs-on: ubuntu-24.04
    needs: ci_setup

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instala ferramentas de lint
        run: |
          npm install -g \
            eslint@8 \
            stylelint \
            stylelint-config-standard \
            htmlhint

      # ── Backend: ESLint ──────────────────────────────────────────────────
      - name: ESLint — Backend (Node.js)
        working-directory: hamoa-obras-docker/api
        run: |
          cat > /tmp/.eslintrc-api.json << 'EOF'
          {
            "env": { "node": true, "es2022": true },
            "extends": "eslint:recommended",
            "parserOptions": { "ecmaVersion": 2022 },
            "rules": {
              "no-console": "off",
              "no-unused-vars": ["warn", { "argsIgnorePattern": "^_" }],
              "no-process-exit": "warn",
              "no-eval": "error",
              "no-implied-eval": "error"
            }
          }
          EOF
          eslint . \
            --ext .js \
            --no-eslintrc -c /tmp/.eslintrc-api.json \
            --ignore-pattern "node_modules/**" \
            --ignore-pattern "uploads/**" \
            --ignore-pattern "logs/**" \
            --format stylish \
            --max-warnings 20

      # ── Frontend: ESLint ─────────────────────────────────────────────────
      - name: ESLint — Frontend (JS)
        working-directory: hamoa-obras-docker/app
        run: |
          cat > /tmp/.eslintrc-app.json << 'EOF'
          {
            "env": { "browser": true, "es2022": true },
            "extends": "eslint:recommended",
            "parserOptions": { "ecmaVersion": 2022 },
            "rules": {
              "no-console": "warn",
              "no-unused-vars": ["warn", { "argsIgnorePattern": "^_" }],
              "no-eval": "error"
            }
          }
          EOF
          eslint . \
            --ext .js \
            --no-eslintrc -c /tmp/.eslintrc-app.json \
            --format stylish \
            --max-warnings 30
        continue-on-error: true

      # ── Frontend: Stylelint ──────────────────────────────────────────────
      - name: Stylelint — CSS
        working-directory: hamoa-obras-docker/app
        run: |
          cat > /tmp/.stylelintrc.json << 'EOF'
          { "extends": ["stylelint-config-standard"] }
          EOF
          stylelint "**/*.css" \
            --config /tmp/.stylelintrc.json \
            --allow-empty-input \
            --max-warnings 20
        continue-on-error: true

      # ── Frontend: HTMLHint ───────────────────────────────────────────────
      - name: HTMLHint — HTML
        working-directory: hamoa-obras-docker/app
        run: |
          cat > /tmp/.htmlhintrc << 'EOF'
          {
            "tagname-lowercase": true,
            "attr-lowercase": true,
            "attr-value-double-quotes": true,
            "doctype-first": false,
            "tag-pair": true,
            "spec-char-escape": true,
            "id-unique": true,
            "src-not-empty": true,
            "title-require": false
          }
          EOF
          htmlhint "**/*.html" --config /tmp/.htmlhintrc
        continue-on-error: true

      # ── Docker: Hadolint ─────────────────────────────────────────────────
      - name: Hadolint — API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: hamoa-obras-docker/api/Dockerfile
          failure-threshold: error

      - name: Hadolint — Redis Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: hamoa-obras-docker/redis/Dockerfile
          failure-threshold: error

      - name: Hadolint — Nginx Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: hamoa-obras-docker/nginx/Dockerfile
          failure-threshold: error

      # ── Análise estática de segurança: Semgrep ───────────────────────────
      # Usa regras públicas gratuitas — não requer conta Semgrep.
      # continue-on-error: true → achados são informativos, não bloqueiam deploy.
      - name: Semgrep — segurança (OWASP / Node.js)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/security-audit
            p/owasp-top-ten
        env:
          SEMGREP_TIMEOUT: 300
        continue-on-error: true

      - name: Sumário do lint
        if: always()
        run: |
          echo "### Lint & Code Review" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ferramenta | Escopo |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ESLint v8     | Backend (Node.js) + Frontend (JS) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stylelint     | Frontend (CSS) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HTMLHint      | Frontend (HTML) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hadolint      | Dockerfiles (API, Redis, Nginx) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Semgrep       | Segurança OWASP / Node.js |" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 3: Build e push — API (Node.js)
  # ===========================================================================
  ci_build_api:
    name: Build API
    runs-on: ubuntu-24.04
    needs: ci_setup
    environment: ${{ needs.ci_setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build e push API
        uses: docker/build-push-action@v6
        with:
          context: hamoa-obras-docker/api
          platforms: linux/amd64
          push: ${{ needs.ci_setup.outputs.should-deploy == 'true' }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-api-ecr:${{ needs.ci_setup.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-api-ecr:latest
          cache-from: type=gha,scope=api-${{ needs.ci_setup.outputs.environment }}
          cache-to:   type=gha,mode=max,scope=api-${{ needs.ci_setup.outputs.environment }}
          provenance: false

      - name: Sumário
        run: |
          REPO="${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-api-ecr"
          echo "**API:** \`${REPO}:${{ needs.ci_setup.outputs.image-tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 4: Build e push — Redis (imagem customizada com entrypoint de senha)
  # Contexto: hamoa-obras-docker/redis/Dockerfile
  # ===========================================================================
  ci_build_redis:
    name: Build Redis
    runs-on: ubuntu-24.04
    needs: ci_setup
    environment: ${{ needs.ci_setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build e push Redis
        uses: docker/build-push-action@v6
        with:
          context: hamoa-obras-docker/redis
          platforms: linux/amd64
          push: ${{ needs.ci_setup.outputs.should-deploy == 'true' }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-redis-ecr:latest
          cache-from: type=gha,scope=redis-${{ needs.ci_setup.outputs.environment }}
          cache-to:   type=gha,mode=max,scope=redis-${{ needs.ci_setup.outputs.environment }}
          provenance: false

      - name: Sumário
        run: |
          REPO="${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-redis-ecr"
          echo "**Redis:** \`${REPO}:latest\`" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 5: Build e push — Web (Nginx + frontend baked)
  # ===========================================================================
  ci_build_web:
    name: Build Web (Nginx)
    runs-on: ubuntu-24.04
    needs: ci_setup
    environment: ${{ needs.ci_setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build e push Web/Nginx
        uses: docker/build-push-action@v6
        with:
          context: hamoa-obras-docker
          file:    hamoa-obras-docker/nginx/Dockerfile
          platforms: linux/amd64
          push: ${{ needs.ci_setup.outputs.should-deploy == 'true' }}
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-web-ecr:${{ needs.ci_setup.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-web-ecr:latest
          cache-from: type=gha,scope=web-${{ needs.ci_setup.outputs.environment }}
          cache-to:   type=gha,mode=max,scope=web-${{ needs.ci_setup.outputs.environment }}
          provenance: false

      - name: Sumário
        run: |
          REPO="${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ needs.ci_setup.outputs.environment }}-web-ecr"
          echo "**Web:** \`${REPO}:${{ needs.ci_setup.outputs.image-tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 6: Deploy — Redis, API e Web
  # Redis é deployado primeiro e aguarda estabilização antes da API,
  # garantindo que o cache esteja disponível quando a API subir.
  # ===========================================================================
  cd_deploy:
    name: Deploy (${{ needs.ci_setup.outputs.environment }})
    runs-on: ubuntu-24.04
    needs: [ci_setup, ci_lint, ci_build_api, ci_build_redis, ci_build_web]
    if: needs.ci_setup.outputs.should-deploy == 'true'
    environment: ${{ needs.ci_setup.outputs.environment }}

    env:
      ENV: ${{ needs.ci_setup.outputs.environment }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Redis primeiro: API depende de Redis para conectar ─────────────────
      - name: Redeploy Redis
        run: |
          aws ecs update-service \
            --cluster "${{ env.PROJECT }}-${{ env.ENV }}-redis-cluster" \
            --service  "${{ env.PROJECT }}-${{ env.ENV }}-redis" \
            --force-new-deployment \
            --region   "${{ env.AWS_REGION }}"

      - name: Aguarda estabilização do Redis
        run: |
          aws ecs wait services-stable \
            --cluster  "${{ env.PROJECT }}-${{ env.ENV }}-redis-cluster" \
            --services "${{ env.PROJECT }}-${{ env.ENV }}-redis" \
            --region   "${{ env.AWS_REGION }}"

      # ── API e Web em paralelo após Redis estável ───────────────────────────
      - name: Redeploy API
        run: |
          aws ecs update-service \
            --cluster "${{ env.PROJECT }}-${{ env.ENV }}-api-cluster" \
            --service  "${{ env.PROJECT }}-${{ env.ENV }}-api" \
            --force-new-deployment \
            --region   "${{ env.AWS_REGION }}"

      - name: Redeploy Web
        run: |
          aws ecs update-service \
            --cluster "${{ env.PROJECT }}-${{ env.ENV }}-web-cluster" \
            --service  "${{ env.PROJECT }}-${{ env.ENV }}-web" \
            --force-new-deployment \
            --region   "${{ env.AWS_REGION }}"

      - name: Aguarda estabilização da API
        run: |
          aws ecs wait services-stable \
            --cluster  "${{ env.PROJECT }}-${{ env.ENV }}-api-cluster" \
            --services "${{ env.PROJECT }}-${{ env.ENV }}-api" \
            --region   "${{ env.AWS_REGION }}"

      - name: Aguarda estabilização do Web
        run: |
          aws ecs wait services-stable \
            --cluster  "${{ env.PROJECT }}-${{ env.ENV }}-web-cluster" \
            --services "${{ env.PROJECT }}-${{ env.ENV }}-web" \
            --region   "${{ env.AWS_REGION }}"

      - name: Sumário
        run: |
          echo "### Deploy concluído" >> "$GITHUB_STEP_SUMMARY"
          echo "| Serviço | Cluster |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Redis | \`${{ env.PROJECT }}-${{ env.ENV }}-redis-cluster\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API   | \`${{ env.PROJECT }}-${{ env.ENV }}-api-cluster\`   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web   | \`${{ env.PROJECT }}-${{ env.ENV }}-web-cluster\`   |" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 7: Deploy — WhatsApp (Evolution API)
  # Ativado via workflow_dispatch com deploy_whatsapp: true.
  # Espelha atendai/evolution-api:latest para o ECR e redeploya o serviço ECS.
  #
  # Pré-requisito: whatsapp_desired_count >= 1 no terraform.tfvars
  # ===========================================================================
  cd_deploy_whatsapp:
    name: Deploy WhatsApp (${{ needs.ci_setup.outputs.environment }})
    runs-on: ubuntu-24.04
    needs: [ci_setup, cd_deploy]
    if: needs.ci_setup.outputs.deploy-whatsapp == 'true'
    environment: ${{ needs.ci_setup.outputs.environment }}

    env:
      ENV: ${{ needs.ci_setup.outputs.environment }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Espelha imagem do Docker Hub para o ECR
        run: |
          ECR_REPO="${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT }}-${{ env.ENV }}-whatsapp-ecr"
          docker pull --platform linux/amd64 atendai/evolution-api:latest
          docker tag atendai/evolution-api:latest "${ECR_REPO}:latest"
          docker push "${ECR_REPO}:latest"
          echo "**WhatsApp:** \`${ECR_REPO}:latest\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Redeploy WhatsApp
        run: |
          aws ecs update-service \
            --cluster "${{ env.PROJECT }}-${{ env.ENV }}-whatsapp-cluster" \
            --service  "${{ env.PROJECT }}-${{ env.ENV }}-whatsapp" \
            --force-new-deployment \
            --region   "${{ env.AWS_REGION }}"

      - name: Aguarda estabilização do WhatsApp
        run: |
          aws ecs wait services-stable \
            --cluster  "${{ env.PROJECT }}-${{ env.ENV }}-whatsapp-cluster" \
            --services "${{ env.PROJECT }}-${{ env.ENV }}-whatsapp" \
            --region   "${{ env.AWS_REGION }}"

      - name: Sumário
        run: |
          echo "### WhatsApp deployado" >> "$GITHUB_STEP_SUMMARY"
          echo "Cluster: \`${{ env.PROJECT }}-${{ env.ENV }}-whatsapp-cluster\`" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # JOB 8: Notificação Google Chat
  # Roda sempre (sucesso ou falha) após todos os jobs.
  # Só notifica em deploys reais (push / workflow_dispatch), não em PRs.
  # Secret necessário: GOOGLE_CHAT_WEBHOOK_URL
  # ===========================================================================
  cd_notify:
    name: Notify Google Chat
    runs-on: ubuntu-24.04
    needs: [ci_setup, ci_lint, ci_build_api, ci_build_redis, ci_build_web, cd_deploy, cd_deploy_whatsapp]
    if: always() && needs.ci_setup.outputs.should-deploy == 'true'
    environment: ${{ needs.ci_setup.outputs.environment }}

    env:
      ENV:         ${{ needs.ci_setup.outputs.environment }}
      TAG:         ${{ needs.ci_setup.outputs.image-tag }}
      LINT:        ${{ needs.ci_lint.result }}
      BUILD_API:   ${{ needs.ci_build_api.result }}
      BUILD_REDIS: ${{ needs.ci_build_redis.result }}
      BUILD_WEB:   ${{ needs.ci_build_web.result }}
      DEPLOY:      ${{ needs.cd_deploy.result }}
      DEPLOY_WA:   ${{ needs.cd_deploy_whatsapp.result }}

    steps:
      - name: Envia notificação
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: |
          if [[ "$LINT" == "failure" ]]; then
            STAGE="Lint & Code Review"
            STATUS="failure"
          elif [[ "$BUILD_API" == "failure" || "$BUILD_REDIS" == "failure" || "$BUILD_WEB" == "failure" ]]; then
            STAGE="Build"
            STATUS="failure"
          elif [[ "$DEPLOY" == "failure" ]]; then
            STAGE="Deploy (Redis / API / Web)"
            STATUS="failure"
          elif [[ "$DEPLOY_WA" == "failure" ]]; then
            STAGE="Deploy WhatsApp"
            STATUS="failure"
          elif [[ "$BUILD_API" == "cancelled" || "$BUILD_REDIS" == "cancelled" || "$BUILD_WEB" == "cancelled" || "$DEPLOY" == "cancelled" ]]; then
            STAGE="Pipeline"
            STATUS="cancelled"
          else
            STAGE="Deploy"
            STATUS="success"
          fi

          case "$STATUS" in
            success)   ICON="✅" ; LABEL="Sucesso"               ;;
            failure)   ICON="❌" ; LABEL="Falhou — ${STAGE}"     ;;
            cancelled) ICON="⚠️" ; LABEL="Cancelado"            ;;
          esac

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD=$(jq -n \
            --arg icon   "$ICON"   \
            --arg label  "$LABEL"  \
            --arg proj   "${{ env.PROJECT }}" \
            --arg env    "$ENV"    \
            --arg branch "${{ github.ref_name }}" \
            --arg tag    "$TAG"    \
            --arg actor  "${{ github.actor }}" \
            --arg url    "$RUN_URL" \
            '{text: "\($icon) *\($label)* — `\($proj)-\($env)`\n\n*Branch:* `\($branch)`\n*Commit:* `\($tag)`\n*Por:* \($actor)\n\n\($url)"}')

          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
