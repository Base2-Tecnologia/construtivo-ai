# --- Volumes ---
volumes:
  redis-data:
    driver: local
  api-uploads:
    driver: local
  api-logs:
    driver: local
  nginx-logs:
    driver: local
  whatsapp-instances:
    driver: local

# --- Redes ---
networks:
  construtivo-net:
    driver: bridge
    name: construtivo-obras-network
