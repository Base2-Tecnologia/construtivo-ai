  # --- Cache / Sessoes (Redis) ---
  construtivo-redis:
    image: redis:7-alpine
    container_name: construtivo-obras-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS} --appendonly yes
    # ports:                   # NAO expor em producao - acesso somente pela rede Docker interna
    #   - "6379:6379"          # descomente APENAS para manutencao local temporaria
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - construtivo-net
    labels:
      - "com.construtivo.service=cache"

