services:

  # --- Frontend CONSTRUTIVO OBRAS (Nginx) ---
  construtivo-web:
    image: nginx:1.25-alpine
    container_name: construtivo-obras-web
    restart: unless-stopped
    ports:
      - "8010:80"
      - "9010:443"
      - "8020:8020"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - construtivo-api
    networks:
      - construtivo-net
    labels:
      - "com.construtivo.service=web"
      - "com.construtivo.version=3.0"

  # --- API / Backend (Node.js + Express) ---
  construtivo-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: construtivo-obras-api
    restart: unless-stopped
    ports:
      - "7010:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      # LDAP/AD
      LDAP_ENABLED: ${LDAP_ENABLED}
      LDAP_URL: ${LDAP_URL}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_BIND_DN: ${LDAP_BIND_DN}
      LDAP_BIND_PASS: ${LDAP_BIND_PASS}
      # E-mail
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Assinatura Eletronica
      ASSINATURA_PROVEDOR: ${ASSINATURA_PROVEDOR}
      ASSINATURA_API_KEY: ${ASSINATURA_API_KEY}
      ASSINATURA_API_SECRET: ${ASSINATURA_API_SECRET}
      # IA - Google Gemini (opcional)
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # CORS - origens permitidas (separadas por virgula)
      CORS_ORIGIN: ${CORS_ORIGIN}
      # Redis
      REDIS_HOST: construtivo-redis
      REDIS_PASS: ${REDIS_PASS}
    # DNS corporativo: permite resolver hostnames do dominio AD
    dns:
      - ${CORP_DNS}
    # Alternativa direta: mapeie hostname -> IP sem depender de DNS
    # extra_hosts:
    #   - "CONSTRUTIVO-SRV-000.construtivo.corp:192.168.x.x"
    volumes:
      - api-uploads:/app/uploads
      - api-logs:/app/logs
    depends_on:
      # construtivo-db:
      #   condition: service_healthy
      construtivo-redis:
        condition: service_healthy
    networks:
      - construtivo-net
    labels:
      - "com.construtivo.service=api"

